<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #e4edf5; font-family: 'Segoe UI', system-ui, sans-serif; }

.tg-teal { background: rgba(13, 148, 136, .3); color: #5eead4; }
